<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Hunter</title>
</head>
<body>
    <div class="container">
        <h1>Job Hunter</h1>
        
        <div class="form-section">
            <div class="form-group">
                <label for="keyword">Keyword</label>
                <input type="text" id="keyword" placeholder="e.g., Python developer">
            </div>

            <div class="form-group">
                <label for="cities">Cities</label>
                <select id="cities" multiple>
                    <option value="Vilnius">Vilnius</option>
                    <option value="Kaunas">Kaunas</option>
                    <option value="Klaipeda">Klaipeda</option>
                    <option value="Šiauliai">Šiauliai</option>
                    <option value="Panevėžys">Panevėžys</option>
                </select>
            </div>

            <div class="form-group">
                <label for="categories">Categories</label>
                <select id="categories" multiple>
                    <option value="administration">Administration</option>
                    <option value="agriculture">Agriculture</option>
                    <option value="buying_supply">Buying/Supply</option>
                    <option value="catering">Catering</option>
                    <option value="construction">Construction</option>
                    <option value="customer_service">Customer Service</option>
                    <option value="design">Design</option>
                    <option value="energetics">Energetics</option>
                    <option value="engineering">Engineering</option>
                    <option value="environmental">Environmental</option>
                    <option value="export">Export</option>
                    <option value="finance">Finance</option>
                    <option value="human_resources">Human Resources</option>
                    <option value="it">IT</option>
                    <option value="insurances">Insurances</option>
                    <option value="law">Law</option>
                    <option value="management">Management</option>
                    <option value="manufacturing">Manufacturing</option>
                    <option value="marketing">Marketing</option>
                    <option value="media">Media</option>
                    <option value="medicine">Medicine</option>
                    <option value="public_administration">Public Administration</option>
                    <option value="real_estate">Real Estate</option>
                    <option value="sales">Sales</option>
                    <option value="security">Security</option>
                    <option value="trade">Trade</option>
                    <option value="training">Training</option>
                    <option value="transport_driving">Transport/Driving</option>
                    <option value="transport_logistics">Transport/Logistics</option>
                    <option value="warehousing">Warehousing</option>
                </select>
            </div>

            <div class="form-group">
                <label for="working_hours">Working Hours</label>
                <select id="working_hours" multiple>
                    <option value="full_time">Full Time</option>
                    <option value="part_time">Part Time</option>
                </select>
            </div>

            <div class="form-group">
                <label for="min_salary">Minimum Salary</label>
                <input type="number" id="min_salary" placeholder="e.g., 1000" min="0">
            </div>

            <div class="button-group">
                <button id="runBtn">Run Search</button>
                <button id="clearBtn">Clear Results</button>
            </div>

            <div id="status" class="status"></div>
        </div>

        <div class="results-section">
            <h2>Results</h2>
            <div id="results" class="no-results">No results yet. Start a search!</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '';

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        function getSelectedValues(selectElement) {
            return Array.from(selectElement.selectedOptions).map(o => o.value);
        }

        async function searchJobs() {
            const keyword = document.getElementById('keyword').value;
            const cities = getSelectedValues(document.getElementById('cities'));
            const categories = getSelectedValues(document.getElementById('categories'));
            const working_hours = getSelectedValues(document.getElementById('working_hours'));
            const min_salary = document.getElementById('min_salary').value || null;

            showStatus('Searching jobs...', 'loading');
            document.getElementById('runBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/api/search_jobs/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        keyword,
                        cities: cities.length > 0 ? cities : null,
                        categories: categories.length > 0 ? categories : null,
                        working_hours: working_hours.length > 0 ? working_hours : null,
                        min_salary: min_salary ? parseInt(min_salary) : null,
                    })
                });

                if (!response.ok) {
                    throw new Error(`Search failed: ${response.statusText}`);
                }

                const data = await response.json();
                const jobs = data.jobs || [];

                if (jobs.length === 0) {
                    showStatus('No jobs found', 'error');
                    document.getElementById('runBtn').disabled = false;
                    displayResults([]);
                    return;
                }

                showStatus(`Found ${jobs.length} jobs! Saving to database...`, 'loading');

                // Save jobs to database
                await saveJobs(jobs);

            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
                document.getElementById('runBtn').disabled = false;
            }
        }

        async function saveJobs(jobs) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/search_jobs/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ jobs })
                });

                if (!response.ok) {
                    throw new Error(`Save failed: ${response.statusText}`);
                }

                showStatus(`Successfully saved ${jobs.length} jobs!`, 'success');
                displayResults(jobs);

            } catch (error) {
                showStatus(`Save error: ${error.message}`, 'error');
            } finally {
                document.getElementById('runBtn').disabled = false;
            }
        }

        function displayResults(jobs) {
            const resultsDiv = document.getElementById('results');

            if (!jobs || jobs.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No jobs to display</div>';
                return;
            }

            resultsDiv.innerHTML = jobs.map(job => {
                const salary = formatSalary(job.min_salary, job.max_salary);
                const applyUrl = job.url || '#';
                const title = job.title || 'N/A';
                const company = job.company || 'N/A';

                return `
                    <div class="job-item">
                        <div class="job-title">${escapeHtml(title)}</div>
                        <div class="job-company">${escapeHtml(company)}</div>
                        <div class="job-salary">${salary}</div>
                        <a href="${escapeHtml(applyUrl)}" target="_blank" class="job-apply">Apply Now</a>
                    </div>
                `;
            }).join('');
        }

        function formatSalary(min, max) {
            if (!min && !max) return 'Salary not specified';
            if (min && max) return `${min} - ${max}`;
            if (min) return `${min}+`;
            return `${max}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('runBtn').addEventListener('click', searchJobs);
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('keyword').value = '';
            document.getElementById('cities').selectedIndex = -1;
            document.getElementById('categories').selectedIndex = -1;
            document.getElementById('working_hours').selectedIndex = -1;
            document.getElementById('min_salary').value = '';
            document.getElementById('status').className = 'status';
            displayResults([]);
        });

        // Allow Enter key to search
        document.getElementById('keyword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchJobs();
        });
    </script>
</body>
</html>
